services:
  # laravel app
  laravel:
    build: ./laravel
    container_name: laravel_app
    volumes:
      - ./laravel:/var/www # bind mount: sync code changes instantly
      - ./php-fpm.conf:/usr/local/etc/php-fpm.d/zz-custom.conf # listen on 9000
    command: > # handle permissions at runtime instaed of build time so they dont get overwritten by windows
      sh -c "chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
      && chmod -R 775 /var/www/storage /var/www/bootstrap/cache
      && php-fpm"
    depends_on:
      db: 
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./laravel/.env
    networks:
      - app-network
  # only waits for the container to start, not for the service inside it to be ready. 
  # MySQL takes several seconds to initialize its data directory on first boot. 
  # Laravel will start, try to connect to MySQL, get refused, and crash — even though the db container is technically "running."
  # The fix involves healthchecks

  # python service (ai - the specialist)
  ai-service:
    build: ./python-service
    container_name: ai_service
    volumes:
      - ./python-service:/app # bind mount: sync python code
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_broker
    networks:
      - app-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"] # Checks for PONG response
      interval: 3s
      timeout: 20s
      retries: 5

  db:
    image: mysql:8.0
    container_name: db
    ports:
      - "3306:3306" # expose to machine
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql # persists data between restarts (this is a named volume)
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 5
      interval: 3s
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"  # expose port 80 inside to 8080 on local machine
    volumes:
      - ./laravel:/var/www  # expose this so it can serve the files directly
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf   
    depends_on:
      - laravel
    networks:
      - app-network

networks:
  app-network:
    driver: bridge # creates the virtual switch

volumes:
  db_data: # yaml mappings always need the colon to make it a key:value pair. In this case, maps it with a null value